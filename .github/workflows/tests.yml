name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: payspyre
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: payspyre_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test
      TEST_DATABASE_URL: postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      JWT_ALGORITHM: HS256
      STRIPE_API_KEY: sk_test_fake_key
      STRIPE_SECRET_KEY: sk_test_fake_secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt found"
          pip install -e .

      - name: Install dev dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pip install httpx
          pip install passlib[bcrypt]
          pip install python-jose[cryptography]
          pip install psycopg2-binary

      - name: Run migrations
        run: |
          python -c "
          from alembic.config import Config
          from alembic import command
          cfg = Config('alembic.ini')
          cfg.set_main_option('sqlalchemy.url', 'postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test')
          command.upgrade(cfg, 'head')
          "

      - name: Run tests (zero-error gate)
        run: |
          pytest --tb=short --strict-markers --strict-config -ra

      - name: Enforce zero errors
        if: always()
        run: |
          pytest --tb=no -q 2>&1 | tee pytest_summary.log
          # Match the pytest summary error COUNT ("N error(s)"), not substrings like
          # the "errors.pydantic.dev" URL in deprecation warnings (false positive).
          if grep -E "[0-9]+ error(s)?\b" pytest_summary.log | grep -v "0 errors"; then
            echo "❌ Tests have errors — blocking merge."
            cat pytest_summary.log
            exit 1
          fi
          echo "✅ Zero errors confirmed"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            htmlcov/
            .coverage
            pytest_summary.log

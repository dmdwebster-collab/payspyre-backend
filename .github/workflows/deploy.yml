name: Build and Deploy

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]
  # Build + deploy are gated to a manual trigger (see build-and-push `if`), so a
  # plain push to main/staging runs only the `test` gate — no auto-deploy until
  # DO CD is wired (DO_ACCESS_TOKEN secret). Deploy via Actions → "Run workflow".
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: payspyre/backend

# ── Required secrets (GitHub → Settings → Secrets and variables → Actions) ───
# DO_ACCESS_TOKEN    DigitalOcean API token — App Platform + Container Registry
#                    write. https://cloud.digitalocean.com/account/api/tokens
# DO_APP_ID          Production App Platform app UUID. Used by `doctl apps get`
#                    to derive the live URL for the /health smoke test.
#                    doctl apps list --format ID,Spec.Name --no-header
# DO_APP_ID_STAGING  Staging app UUID (deploy-staging job; unchanged in P7.0).
# Note: the deploy itself reads the app spec from .do/app.yaml (app
# "payspyre-api"), so no app name/URL secret is required.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  test:
    runs-on: ubuntu-latest

    # Local Postgres service so DB-backed tests can connect (mirrors tests.yml).
    # Without this the suite errored on every DB test (no database available).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: payspyre
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: payspyre_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test
      TEST_DATABASE_URL: postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      JWT_ALGORITHM: HS256
      STRIPE_API_KEY: sk_test_fake_key
      STRIPE_SECRET_KEY: sk_test_fake_secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run migrations
        run: |
          python -c "
          from alembic.config import Config
          from alembic import command
          cfg = Config('alembic.ini')
          cfg.set_main_option('sqlalchemy.url', 'postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test')
          command.upgrade(cfg, 'head')
          "

      - name: Run tests
        run: pytest --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Manual-only until DO CD is wired. On a normal push this job (and the deploy
    # jobs that `needs` it) are skipped, so "Build and Deploy" is green on the
    # test gate alone. deploy-production/-staging still branch on github.ref, so a
    # workflow_dispatch from main -> production, from staging -> staging.
    if: github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DO Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DO_ACCESS_TOKEN }}
          password: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl  # used below to derive the live URL for the smoke test
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform
        # Polls until the deployment is live and fails the job on error (unlike the
        # old fire-and-forget `doctl apps create-deployment`). Deploys the app spec
        # at .do/app.yaml (app "payspyre-api") — app_spec_location, NOT app_name
        # (app_name expects the app's name, not the DO_APP_ID UUID).
        uses: digitalocean/app_action/deploy@cc55bc9b848d25f9c1c9f831cf843fbab3fbfb15  # v2.0.11
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml

      - name: Smoke test — GET /health
        run: |
          URL=$(doctl apps get ${{ secrets.DO_APP_ID }} --format LiveURL --no-header)
          echo "Live URL: $URL"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed — HTTP $STATUS"

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform (staging)
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID_STAGING }} \
            --force-rebuild \
            --spec .do/app-staging.yaml
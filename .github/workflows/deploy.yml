name: Build and Deploy

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: payspyre/backend

jobs:
  test:
    runs-on: ubuntu-latest

    # Local Postgres service so DB-backed tests can connect (mirrors tests.yml).
    # Without this the suite errored on every DB test (no database available).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: payspyre
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: payspyre_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test
      TEST_DATABASE_URL: postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      JWT_ALGORITHM: HS256
      STRIPE_API_KEY: sk_test_fake_key
      STRIPE_SECRET_KEY: sk_test_fake_secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run migrations
        run: |
          python -c "
          from alembic.config import Config
          from alembic import command
          cfg = Config('alembic.ini')
          cfg.set_main_option('sqlalchemy.url', 'postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test')
          command.upgrade(cfg, 'head')
          "

      - name: Run tests
        run: pytest --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DO Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DO_ACCESS_TOKEN }}
          password: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID }} \
            --force-rebuild \
            --spec .do/app.yaml

      - name: Run database migrations
        run: |
          echo "Migrations should run via App Platform pre-deploy hook or separate job"

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Deploy to DigitalOcean App Platform (staging)
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID_STAGING }} \
            --force-rebuild \
            --spec .do/app-staging.yaml
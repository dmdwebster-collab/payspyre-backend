name: Test P2 Patient Profile Service

on:
  push:
    branches: [feature/p2-patient-profile-service]
  pull_request:
    branches: [feature/p2-patient-profile-service]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: payspyre
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: payspyre_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      TEST_DATABASE_URL: postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio psycopg2-binary sqlalchemy fastapi pydantic

      - name: Install project dependencies
        run: |
          pip install -e .

      - name: Run Alembic migrations
        run: |
          python -c "
          from alembic.config import Config
          from alembic import command
          cfg = Config('alembic.ini')
          cfg.set_main_option('sqlalchemy.url', 'postgresql+psycopg2://payspyre:dev123@localhost:5432/payspyre_test')
          command.upgrade(cfg, 'head')
          "

      - name: Run P2 integration tests against local PostgreSQL
        run: |
          python -m pytest tests/test_patient_profile_001_source_tagging.py tests/test_patient_profile_002_discrepancies.py -v --tb=short

      - name: Run P2 tests against live Supabase (optional)
        if: env.DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m pytest tests/test_patient_profile_001_source_tagging.py tests/test_patient_profile_002_discrepancies.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            pytest-*.txt
            .pytest_cache/
          retention-days: 7

name: Delinquency aging (nightly)

# Ages overdue loan installments → late and their loans → delinquent.
# Idempotent; safe to re-run. Requires:
#   secret PROD_DATABASE_URL — the production DB connection string
#   (postgresql+psycopg2://...). The DO managed DB's "Trusted Sources" must
#   allow GitHub Actions runners (or be open) for this to connect.
#
# PARKED: the nightly `schedule:` trigger is commented out until there is a real
# environment+DB for this to run against. There is no production DB yet, and the
# staging DB is a dev-tier App Platform DB whose connection string isn't wired in
# here — so the cron would only fail nightly. Re-enable by uncommenting `schedule:`
# once PROD_DATABASE_URL (or a STAGING_DATABASE_URL) secret is set. Until then it
# can still be run on demand via the Actions "Run workflow" button (workflow_dispatch).
on:
  # schedule:
  #   - cron: "0 8 * * *"   # 08:00 UTC daily — re-enable when a DB secret is wired
  workflow_dispatch: {}

jobs:
  age:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Run delinquency aging
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: python -m app.jobs.delinquency
